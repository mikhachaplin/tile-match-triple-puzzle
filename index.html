<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Tile Match - Triple Puzzle</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:manipulation;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
canvas{display:block;position:fixed;top:0;left:0}
#editor-panel{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:90%;max-width:400px;background:rgba(30,30,30,0.95);border-radius:16px;padding:24px;color:#fff;font-family:Arial,sans-serif;z-index:100;border:1px solid #555}
#editor-panel h2{text-align:center;margin-bottom:16px;font-size:20px}
#editor-panel label{display:block;margin-top:10px;font-size:13px;color:#ccc}
#editor-panel input[type=range]{width:100%;margin-top:4px}
#editor-panel .val{float:right;color:#F1C40F;font-weight:bold}
#editor-panel .btn-row{margin-top:16px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
#editor-panel button{padding:10px 16px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:bold;color:#fff}
.btn-apply{background:#27AE60}.btn-export{background:#2980B9}.btn-import{background:#E67E22}.btn-close{background:#C0392B}
</style>
</head>
<body>
<div id="editor-panel">
<h2>🔧 Level Editor</h2>
<label>Tile Types: <span class="val" id="val-types">8</span></label>
<input type="range" id="sl-types" min="5" max="15" value="8">
<label>Layers: <span class="val" id="val-layers">2</span></label>
<input type="range" id="sl-layers" min="1" max="5" value="2">
<label>Tiles per Type: <span class="val" id="val-pertype">6</span></label>
<input type="range" id="sl-pertype" min="3" max="12" step="3" value="6">
<label>Boosters: <span class="val" id="val-boosters">3</span></label>
<input type="range" id="sl-boosters" min="0" max="10" value="3">
<div class="btn-row">
<button class="btn-apply" onclick="applyEditor()">Apply</button>
<button class="btn-export" onclick="exportJSON()">Export JSON</button>
<button class="btn-import" onclick="document.getElementById('importFile').click()">Import JSON</button>
<button class="btn-close" onclick="toggleEditor()">Close</button>
<input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)">
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/pixi.js@7/dist/pixi.min.js"></script>
<script>
(function(){var p=prompt('Enter password:');if(btoa(p||'')!==btoa('tile123'))location.reload()})();

function easeOutCubic(t){return 1-Math.pow(1-t,3)}
function easeOutBack(t){var c1=1.70158,c3=c1+1;return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2)}

var app,stage;
var COLORS=['#E74C3C','#E67E22','#F1C40F','#9B59B6','#E91E63','#FF9800','#8BC34A','#FFC107','#F44336','#00BCD4'];
var EMOJIS=['🍎','🍊','🍋','🍇','🍓','🍑','🥝','🍌','🍒','🫐'];
var screenState='menu';
var tiles=[],shelfItems=[];
var score=0,level=1,maxShelf=7;
var undoStack=[];
var levelConfig={types:8,layers:2,perType:6,boosters:3};
var boosterCounts={undo:3,shuffle:3,extraSlot:3,hint:3};
var fieldContainer,shelfContainer,flyLayer,topBar;
var animating=false;
var confettiParticles=[];

var SW,SH,TW,TH,SLOT_W,SLOT_H;
var TOP_H,BBAR_H,FIELD_H,SHELF_H;

// NO PAN/ZOOM — field auto-scales to fit
var tileMap={}; // map "col,row,layer" -> tile object for fast click detection

app=new PIXI.Application({width:window.innerWidth,height:window.innerHeight,backgroundColor:0x000000,resolution:window.devicePixelRatio||1,autoDensity:true});
document.body.appendChild(app.view);
stage=app.stage;
stage.sortableChildren=true;
stage.eventMode='static';

function calcSizes(){
  SW=window.innerWidth;SH=window.innerHeight;
  TOP_H=Math.max(SH*0.07,38);
  BBAR_H=Math.max(SH*0.06,36);
  SHELF_H=Math.max(SH*0.14,58);
  FIELD_H=SH-TOP_H-BBAR_H-SHELF_H;
  
  // Auto-scale tiles to fit field area
  // Max 5 columns, max rows depends on tile count
  var cols=Math.min(5,levelConfig.types);
  var totalTiles=levelConfig.types*levelConfig.perType;
  var rows=Math.ceil(totalTiles/cols/levelConfig.layers)+levelConfig.layers;
  
  // Tile size = fit both width and height
  var maxTileW=(SW-20)/cols/1.4; // 1.4 = 1 + gap ratio
  var maxTileH=(FIELD_H-20)/rows/1.3;
  var tileBase=Math.min(maxTileW,maxTileH);
  TW=tileBase;
  TH=TW*1.4;
  
  // Shelf slots — fit 8 across width
  SLOT_W=(SW-20)/8-3;
  SLOT_H=SLOT_W*1.4;
  
  // If slot is too tall for shelf, constrain
  if(SLOT_H>SHELF_H-8){SLOT_H=SHELF_H-8;SLOT_W=SLOT_H/1.4}
}
calcSizes();

window.addEventListener('resize',function(){
  app.renderer.resize(window.innerWidth,window.innerHeight);
  calcSizes();
  if(screenState==='play')rebuildPlayScreen();
  if(screenState==='menu')drawMenu();
});

// ===== EDITOR =====
function toggleEditor(){var p=document.getElementById('editor-panel');p.style.display=p.style.display==='none'?'block':'none'}
document.addEventListener('keydown',function(e){if(e.key==='e'||e.key==='E')toggleEditor()});
['types','layers','pertype','boosters'].forEach(function(k){var sl=document.getElementById('sl-'+k);sl.oninput=function(){document.getElementById('val-'+k).textContent=this.value}});
function applyEditor(){levelConfig.types=+document.getElementById('sl-types').value;levelConfig.layers=+document.getElementById('sl-layers').value;levelConfig.perType=+document.getElementById('sl-pertype').value;levelConfig.boosters=+document.getElementById('sl-boosters').value;boosterCounts={undo:levelConfig.boosters,shuffle:levelConfig.boosters,extraSlot:levelConfig.boosters,hint:levelConfig.boosters};toggleEditor();calcSizes();startGame()}
function exportJSON(){var b=new Blob([JSON.stringify(levelConfig,null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='tile-match-config.json';a.click()}
function importJSON(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){levelConfig=JSON.parse(ev.target.result);applyEditor()};r.readAsText(f)}

// ===== SPRITE HELPERS =====
function makeTileSprite(type,blocked,w,h){
  var c=new PIXI.Container();
  var g=new PIXI.Graphics();
  var color=PIXI.utils.string2hex(COLORS[type]);
  g.beginFill(0x000000,0.2);g.drawRoundedRect(2,2,w,h,w*0.1);g.endFill();
  g.beginFill(color);g.drawRoundedRect(0,0,w,h,w*0.1);g.endFill();
  g.beginFill(0xFFFFFF,0.18);g.drawRoundedRect(3,3,w-6,h*0.25,w*0.08);g.endFill();
  c.addChild(g);
  var t=new PIXI.Text(EMOJIS[type],{fontSize:Math.min(w,h)*0.4});t.anchor.set(0.5);t.x=w/2;t.y=h/2;c.addChild(t);
  c.alpha=blocked?0.5:1;c._tileType=type;c._blocked=blocked;c._w=w;c._h=h;
  return c;
}
function makeSlotSprite(){
  var c=new PIXI.Container();
  var g=new PIXI.Graphics();g.lineStyle(2,0xFFFFFF,0.35);g.drawRoundedRect(0,0,SLOT_W,SLOT_H,SLOT_W*0.1);c.addChild(g);return c;
}
function makeButton(text,color,w,h,cb){
  var c=new PIXI.Container();c.eventMode='static';c.cursor='pointer';
  var g=new PIXI.Graphics();g.beginFill(color);g.drawRoundedRect(0,0,w,h,h*0.3);g.endFill();c.addChild(g);
  var t=new PIXI.Text(text,{fontSize:h*0.38,fill:0xFFFFFF,fontWeight:'bold'});t.anchor.set(0.5);t.x=w/2;t.y=h/2;c.addChild(t);
  c.on('pointerdown',function(){animateScale(c,1,0.92,60,function(){animateScale(c,0.92,1,80)})});
  c.on('pointerdown',function(){if(cb)cb()});
  return c;
}

// ===== ANIMATIONS =====
function animateMove(obj,fx,fy,tx,ty,dur,cb){var s=performance.now();function tick(){var t=Math.min((performance.now()-s)/dur,1);var e=easeOutCubic(t);obj.x=fx+(tx-fx)*e;obj.y=fy+(ty-fy)*e;if(t<1)requestAnimationFrame(tick);else{obj.x=tx;obj.y=ty;if(cb)cb()}}requestAnimationFrame(tick)}
function animateScale(obj,from,to,dur,cb){var s=performance.now();function tick(){var t=Math.min((performance.now()-s)/dur,1);obj.scale.set(from+(to-from)*easeOutBack(t));if(t<1)requestAnimationFrame(tick);else{obj.scale.set(to);if(cb)cb()}}requestAnimationFrame(tick)}
function animateShake(obj,cb){var ox=obj.x;var i=0;function step(){if(i>=6){obj.x=ox;if(cb)cb();return}obj.x=ox+(i%2===0?5:-5);i++;setTimeout(step,40)}step()}
function animatePulse(obj){if(obj._pulsing)return;obj._pulsing=true;var s=performance.now();function tick(){if(!obj._pulsing)return;var t=((performance.now()-s)%600)/600;obj.scale.set(1+0.1*Math.sin(t*Math.PI*2));requestAnimationFrame(tick)}requestAnimationFrame(tick)}
function stopPulse(obj){obj._pulsing=false;obj.scale.set(1)}

function animateTripleMatch(sprites,cb){
  var dur=350;var s=performance.now();
  var anchors=sprites.map(function(sp){return{x:sp.x,y:sp.y,w:sp._w||SLOT_W,h:sp._h||SLOT_H}});
  function tick(){
    var t=Math.min((performance.now()-s)/dur,1);
    var sc=t<0.2?1+0.15*(t/0.2):1.15*(1-easeOutCubic((t-0.2)/0.8));
    sprites.forEach(function(sp,i){var a=anchors[i];var cx=a.x+a.w/2;var cy=a.y+a.h/2;sp.scale.set(sc);sp.x=cx-(a.w*sc)/2;sp.y=cy-(a.h*sc)/2;sp.alpha=1-t});
    if(t<1)requestAnimationFrame(tick);else{sprites.forEach(function(sp){sp.parent&&sp.parent.removeChild(sp)});if(cb)cb()}
  }
  requestAnimationFrame(tick);
}

// ===== CONFETTI =====
function spawnConfetti(){confettiParticles.forEach(function(p){p.parent&&p.parent.removeChild(p)});confettiParticles=[];var cls=[0xE74C3C,0x3498DB,0x2ECC71,0xF1C40F,0x9B59B6,0xE91E63,0xFF9800,0x00BCD4,0x8BC34A,0xFFC107];for(var i=0;i<150;i++){var g=new PIXI.Graphics();var c=cls[Math.floor(Math.random()*cls.length)];g.beginFill(c);var sz=4+Math.random()*8;var shape=Math.random();if(shape<0.3){g.drawRoundedRect(0,0,sz,sz,2)}else if(shape<0.6){g.drawCircle(0,0,sz/2)}else{g.drawStar(0,0,5,sz/2,sz/4)}g.endFill();g.x=SW*Math.random();g.y=-20-Math.random()*200;g._vx=(Math.random()-0.5)*6;g._vy=Math.random()*4+1;g._rot=(Math.random()-0.5)*0.3;g._alpha=1;stage.addChild(g);confettiParticles.push(g)}}
app.ticker.add(function(){if(screenState==='win')confettiParticles.forEach(function(p){p.x+=p._vx;p.y+=p._vy;p._vy+=0.1;p.rotation+=p._rot;p._alpha-=0.002;p.alpha=Math.max(0,p._alpha);if(p.y>SH+20)p._vy=-Math.abs(p._vy)*0.3})});

// ===== GAME LOGIC =====
function generateTiles(){
  tiles=[];tileMap={};
  var total=levelConfig.types*levelConfig.perType;
  var types=[];for(var t=0;t<levelConfig.types;t++)for(var j=0;j<levelConfig.perType;j++)types.push(t);
  for(var i=types.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=types[i];types[i]=types[j];types[j]=tmp}
  var cols=Math.min(Math.floor((SW-20)/(TW*1.4)),5);
  var idx=0;
  for(var layer=0;layer<levelConfig.layers;layer++){
    var count=Math.ceil(total/levelConfig.layers);
    for(var i=0;i<count&&idx<total;i++){
      var r=Math.floor(i/cols);var c=i%cols;
      var tile={type:types[idx],layer:layer,col:c,row:r,removed:false,sprite:null};
      tiles.push(tile);
      tileMap[c+','+r+','+layer]=tile;
      idx++;
    }
  }
}

function isBlocked(tile){
  // A tile is blocked if any tile with HIGHER layer overlaps it
  for(var i=0;i<tiles.length;i++){
    var t=tiles[i];
    if(t===tile||t.removed||t.layer<=tile.layer)continue;
    // Same stack position (same col/row) — always blocked by higher layer
    if(t.col===tile.col&&t.row===tile.row)return true;
    // Adjacent stack — check if visually overlapping
    // With our big gaps, tiles in different stacks should NOT block each other
    // Only same col+row with higher layer blocks
  }
  return false;
}

function checkTriple(){for(var t=0;t<10;t++){var m=shelfItems.filter(function(s){return s&&s._tileType===t});if(m.length>=3){var rm=m.slice(0,3);rm.forEach(function(s){var idx=shelfItems.indexOf(s);shelfItems[idx]=null});animateTripleMatch(rm,function(){rm.forEach(function(s){s.parent&&s.parent.removeChild(s)});rebuildShelfVisuals();checkWin()});score+=30;updateScoreText();return true}}return false}
function checkLose(){if(shelfItems.filter(function(s){return s!==null}).length>=maxShelf){screenState='lose';drawLose()}}
function checkWin(){if(tiles.filter(function(t){return!t.removed}).length===0){screenState='win';drawWin()}}

function boosterUndo(){if(boosterCounts.undo<=0||undoStack.length===0)return;boosterCounts.undo--;var last=undoStack.pop();if(!last)return;last.tile.removed=false;shelfItems[last.shelfIdx]=null;rebuildPlayScreen()}
function boosterShuffle(){if(boosterCounts.shuffle<=0)return;boosterCounts.shuffle--;var rem=tiles.filter(function(t){return!t.removed});var types=rem.map(function(t){return t.type});for(var i=types.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=types[i];types[i]=types[j];types[j]=tmp}rem.forEach(function(t,i){t.type=types[i]});rebuildPlayScreen()}
function boosterExtraSlot(){if(boosterCounts.extraSlot<=0)return;boosterCounts.extraSlot--;maxShelf=8;rebuildPlayScreen()}
function boosterHint(){if(boosterCounts.hint<=0)return;boosterCounts.hint--;var found=null;for(var t=0;t<10&&!found;t++){if(shelfItems.filter(function(s){return s&&s._tileType===t}).length>=2)found=tiles.find(function(tile){return!tile.removed&&tile.type===t&&!isBlocked(tile)})}if(!found)found=tiles.find(function(t){return!t.removed&&!isBlocked(t)});if(found&&found.sprite)animatePulse(found.sprite);setTimeout(function(){if(found&&found.sprite)stopPulse(found.sprite)},3000)}

// ===== CLICK — simple direct approach =====
function onTileClick(tile){
  if(animating||screenState!=='play')return;
  if(isBlocked(tile)){
    if(tile.sprite)animateShake(tile.sprite);
    return;
  }
  var slotIdx=-1;for(var i=0;i<maxShelf;i++){if(shelfItems[i]===null){slotIdx=i;break}}
  if(slotIdx===-1){checkLose();return}
  if(shelfItems.filter(function(s){return s!==null}).length>=maxShelf){checkLose();return}
  tile.removed=true;animating=true;
  undoStack.push({tile:tile,shelfIdx:slotIdx});

  var sp=tile.sprite;
  var fromX=sp.x+fieldContainer.x;var fromY=sp.y+fieldContainer.y;

  // Press effect then fly
  animateScale(sp,1,0.85,80,function(){
    animateScale(sp,0.85,1.1,100,function(){
      var fly=makeTileSprite(tile.type,false,SLOT_W,SLOT_H);
      // Start: center of the tile on field
      var fieldCX=fromX+TW/2;
      var fieldCY=fromY+TH/2;
      fly.x=fieldCX-SLOT_W/2;
      fly.y=fieldCY-SLOT_H/2;
      fly.scale.set(TW/SLOT_W,TH/SLOT_H); // start at field tile size
      flyLayer.addChild(fly);
      sp.visible=false;

      var shelfStartX=(SW-maxShelf*(SLOT_W+3))/2;
      var targetX=shelfStartX+slotIdx*(SLOT_W+3);
      var targetY=SH-SHELF_H+(SHELF_H-SLOT_H)/2;
      // Target center
      var targetCX=targetX+SLOT_W/2;
      var targetCY=targetY+SLOT_H/2;

      // Animate: move center → center, shrink scale to 1
      var dur=300;var s=performance.now();
      var sx0=TW/SLOT_W,sy0=TH/SLOT_H;var sx1=1,sy1=1;

      function flyTick(){
        var t=Math.min((performance.now()-s)/dur,1);
        var e=easeOutCubic(t);
        // Scale interpolation
        var csx=sx0+(sx1-sx0)*e;
        var csy=sy0+(sy1-sy0)*e;
        fly.scale.set(csx,csy);
        // Center position interpolation: from center of field tile to center of shelf slot
        var cx=fieldCX+(targetCX-fieldCX)*e;
        var cy=fieldCY+(targetCY-fieldCY)*e;
        // Position sprite so its center is at (cx, cy)
        fly.x=cx-(SLOT_W*csx)/2;
        fly.y=cy-(SLOT_H*csy)/2;
        if(t<1)requestAnimationFrame(flyTick);
        else{
          shelfItems[slotIdx]=fly;
          fly.x=targetX;fly.y=targetY;
          fly.scale.set(1,1); // final size = slot size
          shelfContainer.addChild(fly);
          flyLayer.removeChild(fly);
          animating=false;
          checkTriple();
          setTimeout(function(){checkLose()},350);
          // Rebuild entire field to fix blocked states
          rebuildFieldTiles();
        }
      }
      requestAnimationFrame(flyTick);
    });
  });
}

// Rebuild ONLY the field tiles (preserving shelf)
function rebuildFieldTiles(){
  if(!fieldContainer)return;
  fieldContainer.removeChildren();
  
  var ft=TOP_H+BBAR_H;
  // Field BG
  var fbg=new PIXI.Graphics();fbg.beginFill(0xF5F0E8);fbg.drawRect(0,0,SW,FIELD_H);fbg.endFill();
  fbg.y=ft;fieldContainer.addChild(fbg);

  // Calculate positions — auto-fit
  var activeTiles=tiles.filter(function(t){return!t.removed});
  var maxCol=0,maxRow=0;
  activeTiles.forEach(function(t){if(t.col>maxCol)maxCol=t.col;if(t.row>maxRow)maxRow=t.row});
  
  var gapX=TW*0.4;var gapY=TH*0.3;
  var contentW=(maxCol+1)*TW+maxCol*gapX;
  var contentH=(maxRow+1)*TH+maxRow*gapY;
  var offX=(SW-contentW)/2;
  var offY=ft+(FIELD_H-contentH)/2;

  var layerOX=3;var layerOY=-5;

  activeTiles.forEach(function(tile){
    var blocked=isBlocked(tile);
    var sp=makeTileSprite(tile.type,blocked,TW,TH);
    sp.x=offX+tile.col*(TW+gapX)+tile.layer*layerOX;
    sp.y=offY+tile.row*(TH+gapY)+tile.layer*layerOY;
    
    if(!blocked){
      sp.eventMode='static';
      sp.cursor='pointer';
      // Direct click handler — simple and reliable
      (function(t){
        sp.on('pointertap',function(){
          onTileClick(t);
        });
      })(tile);
    }
    
    tile.sprite=sp;
    fieldContainer.addChild(sp);
  });
}

function refreshBlockedStates(){
  // Rebuild field — this guarantees correct interactive state
  rebuildFieldTiles();
}

// ===== SCREENS =====
function clearAll(){stage.removeChildren();fieldContainer=null;shelfContainer=null;topBar=null;flyLayer=null;confettiParticles.forEach(function(p){p.parent&&p.parent.removeChild(p)});confettiParticles=[]}

function drawMenu(){
  clearAll();screenState='menu';
  var c=new PIXI.Container();c.zIndex=0;stage.addChild(c);
  for(var i=0;i<8;i++){var g=new PIXI.Graphics();g.beginFill(PIXI.utils.string2hex(COLORS[i]),0.08);g.drawRect(0,i*SH/8,SW,SH/8);g.endFill();c.addChild(g)}
  var t=new PIXI.Text('Tile Match',{fontSize:Math.min(SW*0.14,52),fill:0xFFFFFF,fontWeight:'bold'});t.anchor.set(0.5);t.x=SW/2;t.y=SH*0.25;c.addChild(t);
  var s=new PIXI.Text('Triple Puzzle',{fontSize:Math.min(SW*0.08,28),fill:0xF1C40F,fontWeight:'bold'});s.anchor.set(0.5);s.x=SW/2;s.y=SH*0.33;c.addChild(s);
  var bw=SW*0.6;var bh=SW*0.12;
  var pb=makeButton('▶ Play',0x27AE60,bw,bh,function(){startGame()});pb.x=(SW-bw)/2;pb.y=SH*0.5;c.addChild(pb);
  var eb=makeButton('🔧 Editor',0x2980B9,bw,bh,function(){toggleEditor()});eb.x=(SW-bw)/2;eb.y=SH*0.5+bh*1.5;c.addChild(eb);
}

function startGame(){
  clearAll();screenState='play';score=0;maxShelf=7;undoStack=[];shelfItems=[];
  for(var i=0;i<8;i++)shelfItems.push(null);
  boosterCounts={undo:levelConfig.boosters,shuffle:levelConfig.boosters,extraSlot:levelConfig.boosters,hint:levelConfig.boosters};
  generateTiles();rebuildPlayScreen();
}

function rebuildPlayScreen(){
  stage.removeChildren();confettiParticles=[];
  fieldContainer=new PIXI.Container();fieldContainer.zIndex=1;
  shelfContainer=new PIXI.Container();shelfContainer.zIndex=2;
  flyLayer=new PIXI.Container();flyLayer.zIndex=10;
  topBar=new PIXI.Container();topBar.zIndex=5;
  stage.addChild(fieldContainer);stage.addChild(shelfContainer);stage.addChild(flyLayer);stage.addChild(topBar);

  // TOP BAR
  topBar.addChild((function(){var g=new PIXI.Graphics();g.beginFill(0x1A1A2E,0.92);g.drawRect(0,0,SW,TOP_H);g.endFill();return g})());
  var st=new PIXI.Text('⭐ '+score,{fontSize:Math.min(SW*0.04,16),fill:0xF1C40F,fontWeight:'bold'});st.x=SW/2;st.y=TOP_H/2;st.anchor.set(0.5);st._isScore=true;topBar.addChild(st);
  var btnH=TOP_H*0.7;
  topBar.addChild(makeButton('⏸',0x7F8C8D,btnH,btnH,function(){drawMenu()}));topBar.children[topBar.children.length-1].x=SW-btnH-6;topBar.children[topBar.children.length-1].y=(TOP_H-btnH)/2;
  topBar.addChild(makeButton('🔧',0x555,btnH,btnH,function(){toggleEditor()}));topBar.children[topBar.children.length-1].x=6;topBar.children[topBar.children.length-1].y=(TOP_H-btnH)/2;

  // Booster bar
  topBar.addChild((function(){var g=new PIXI.Graphics();g.beginFill(0x16213E,0.85);g.drawRect(0,TOP_H,SW,BBAR_H);g.endFill();return g})());
  var bbw=Math.min(SW*0.22,80);var bbh=BBAR_H-8;var startX=(SW-4*bbw-3*4)/2;
  [{text:'↩'+boosterCounts.undo,color:0x8E44AD,fn:boosterUndo},{text:'🔀'+boosterCounts.shuffle,color:0x2980B9,fn:boosterShuffle},{text:'+1('+boosterCounts.extraSlot+')',color:0x27AE60,fn:boosterExtraSlot},{text:'💡'+boosterCounts.hint,color:0xE67E22,fn:boosterHint}].forEach(function(b,i){
    var btn=makeButton(b.text,b.color,bbw,bbh,b.fn);btn.x=startX+i*(bbw+4);btn.y=TOP_H+4;topBar.addChild(btn);
  });

  // FIELD — auto-fit tiles
  rebuildFieldTiles();

  // SHELF
  shelfContainer.addChild((function(){var g=new PIXI.Graphics();g.beginFill(0x8B6F47);g.drawRect(0,SH-SHELF_H,SW,SHELF_H);g.endFill();return g})());
  var shelfStartX=(SW-maxShelf*(SLOT_W+3))/2;
  for(var i=0;i<maxShelf;i++){var sl=makeSlotSprite();sl.x=shelfStartX+i*(SLOT_W+3);sl.y=SH-SHELF_H+(SHELF_H-SLOT_H)/2;shelfContainer.addChild(sl)}
  shelfItems.forEach(function(item,idx){
    if(!item)return;
    item.x=shelfStartX+idx*(SLOT_W+3);item.y=SH-SHELF_H+(SHELF_H-SLOT_H)/2;item.scale.set(1);
    shelfContainer.addChild(item);
  });
}

function rebuildShelfVisuals(){var shelfStartX=(SW-maxShelf*(SLOT_W+3))/2;shelfItems.forEach(function(item,idx){if(!item)return;item.x=shelfStartX+idx*(SLOT_W+3);item.y=SH-SHELF_H+(SHELF_H-SLOT_H)/2})}
function updateScoreText(){if(!topBar)return;topBar.children.forEach(function(c){if(c._isScore)c.text='⭐ '+score})}

function drawWin(){
  clearAll();screenState='win';
  var c=new PIXI.Container();c.zIndex=0;stage.addChild(c);
  c.addChild((function(){var g=new PIXI.Graphics();g.beginFill(0x000000,0.6);g.drawRect(0,0,SW,SH);g.endFill();return g})());
  c.addChild((function(){var t=new PIXI.Text('🎉 Victory!',{fontSize:Math.min(SW*0.12,48),fill:0x2ECC71,fontWeight:'bold'});t.anchor.set(0.5);t.x=SW/2;t.y=SH*0.3;return t})());
  c.addChild((function(){var s=new PIXI.Text('Score: '+score,{fontSize:Math.min(SW*0.07,28),fill:0xF1C40F,fontWeight:'bold'});s.anchor.set(0.5);s.x=SW/2;s.y=SH*0.42;return s})());
  var bw=SW*0.5;var bh=SW*0.1;
  c.addChild(makeButton('Next Level ▶',0x27AE60,bw,bh,function(){level++;levelConfig.types=Math.min(levelConfig.types+1,15);levelConfig.layers=Math.min(levelConfig.layers+1,5);calcSizes();startGame()}));c.children[c.children.length-1].x=(SW-bw)/2;c.children[c.children.length-1].y=SH*0.55;
  c.addChild(makeButton('🏠 Menu',0x2980B9,bw,bh,function(){drawMenu()}));c.children[c.children.length-1].x=(SW-bw)/2;c.children[c.children.length-1].y=SH*0.55+bh*1.4;
  spawnConfetti();
}

function drawLose(){
  clearAll();screenState='lose';
  var c=new PIXI.Container();c.zIndex=0;stage.addChild(c);
  c.addChild((function(){var g=new PIXI.Graphics();g.beginFill(0x000000,0.7);g.drawRect(0,0,SW,SH);g.endFill();return g})());
  var i=0;function sh(){if(i>=6){c.x=0;return}c.x=i%2===0?8:-8;i++;setTimeout(sh,60)}sh();
  c.addChild((function(){var t=new PIXI.Text('😢 Shelf Full!',{fontSize:Math.min(SW*0.1,42),fill:0xE74C3C,fontWeight:'bold'});t.anchor.set(0.5);t.x=SW/2;t.y=SH*0.28;return t})());
  var bw=SW*0.5;var bh=SW*0.1;
  c.addChild(makeButton('🔄 Retry',0xE67E22,bw,bh,function(){startGame()}));c.children[c.children.length-1].x=(SW-bw)/2;c.children[c.children.length-1].y=SH*0.45;
  c.addChild(makeButton('↩ Use Undo',0x8E44AD,bw,bh,function(){boosterCounts.undo=Math.max(boosterCounts.undo,1);boosterUndo();if(shelfItems.filter(function(s){return s!==null}).length<maxShelf)startGame()}));c.children[c.children.length-1].x=(SW-bw)/2;c.children[c.children.length-1].y=SH*0.55;
  c.addChild(makeButton('🏠 Menu',0x2980B9,bw,bh,function(){drawMenu()}));c.children[c.children.length-1].x=(SW-bw)/2;c.children[c.children.length-1].y=SH*0.65;
}

drawMenu();
</script>
</body>
</html>
